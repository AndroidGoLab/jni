package: resolver
go_import: "github.com/xaionaro-go/jni/content/resolver"

classes:
  - java_class: android.content.ContentResolver
    go_type: Resolver
    obtain: context_method
    context_method: getContentResolver
    context_params: []  # no params
    close: false  # ContentResolver lifecycle is tied to Context

    methods:
      - java_method: query
        params:
          - { java_type: android.net.Uri, go_name: uri }
          - { java_type: "String[]", go_name: projection }
          - { java_type: String, go_name: selection }
          - { java_type: "String[]", go_name: selectionArgs }
          - { java_type: String, go_name: sortOrder }
        returns: android.database.Cursor
        go_name: queryRaw  # internal, overlay wraps Uri
        error: true

      - java_method: openFileDescriptor
        params:
          - { java_type: android.net.Uri, go_name: uri }
          - { java_type: String, go_name: mode }
        returns: android.os.ParcelFileDescriptor
        go_name: openFileDescriptorRaw  # internal
        error: true

  - java_class: android.database.Cursor
    go_type: Cursor
    close: true
    methods:
      - { java_method: moveToNext, returns: boolean, go_name: moveToNext }
      - { java_method: getString, params: [{ java_type: int, go_name: columnIndex }], returns: String, go_name: GetString, error: true }
      - { java_method: getInt, params: [{ java_type: int, go_name: columnIndex }], returns: int, go_name: GetInt, error: true }
      - { java_method: getLong, params: [{ java_type: int, go_name: columnIndex }], returns: long, go_name: GetLong, error: true }
      - { java_method: getColumnIndex, params: [{ java_type: String, go_name: columnName }], returns: int, go_name: GetColumnIndex, error: true }

  - java_class: android.net.Uri
    go_type: uri  # unexported
    static_methods:
      - java_method: parse
        params: [{ java_type: String, go_name: uriString }]
        returns: android.net.Uri
        go_name: parse

  - java_class: android.os.ParcelFileDescriptor
    go_type: parcelFD  # unexported
    methods:
      - { java_method: getFd, returns: int, go_name: getFd }
      - { java_method: detachFd, returns: int, go_name: detachFd }

constants: []
callbacks: []
