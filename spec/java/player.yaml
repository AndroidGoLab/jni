package: player
go_import: "github.com/xaionaro-go/jni/media/player"

classes:
  - java_class: android.media.MediaPlayer
    go_type: Player
    obtain: constructor
    constructor_params: []
    close: false

    methods:
      - java_method: setDataSource
        params: [{ java_type: String, go_name: path }]
        returns: void
        go_name: setDataSourcePath
        error: true

      - java_method: setDataSource
        params:
          - { java_type: android.content.Context, go_name: ctx }
          - { java_type: android.net.Uri, go_name: uri }
        returns: void
        go_name: setDataSourceUri
        error: true
        overload_key: uri

      - java_method: prepare
        params: []
        returns: void
        go_name: prepare
        error: true

      - java_method: prepareAsync
        params: []
        returns: void
        go_name: prepareAsync
        error: true

      - java_method: start
        params: []
        returns: void
        go_name: start
        error: true

      - java_method: pause
        params: []
        returns: void
        go_name: pause
        error: true

      - java_method: stop
        params: []
        returns: void
        go_name: stop
        error: true

      - java_method: seekTo
        params: [{ java_type: int, go_name: msec }]
        returns: void
        go_name: seekTo
        error: true

      - java_method: getDuration
        params: []
        returns: int
        go_name: getDuration
        error: true

      - java_method: getCurrentPosition
        params: []
        returns: int
        go_name: getCurrentPosition
        error: true

      - java_method: isPlaying
        params: []
        returns: boolean
        go_name: isPlaying
        error: true

      - java_method: setVolume
        params:
          - { java_type: float, go_name: leftVolume }
          - { java_type: float, go_name: rightVolume }
        returns: void
        go_name: setVolume
        error: true

      - java_method: setLooping
        params: [{ java_type: boolean, go_name: looping }]
        returns: void
        go_name: setLooping
        error: true

      - java_method: setOnCompletionListener
        params: [{ java_type: android.media.MediaPlayer$OnCompletionListener, go_name: listener }]
        returns: void
        go_name: setOnCompletionListener

      - java_method: setOnErrorListener
        params: [{ java_type: android.media.MediaPlayer$OnErrorListener, go_name: listener }]
        returns: void
        go_name: setOnErrorListener

      - java_method: setOnPreparedListener
        params: [{ java_type: android.media.MediaPlayer$OnPreparedListener, go_name: listener }]
        returns: void
        go_name: setOnPreparedListener

      - java_method: release
        params: []
        returns: void
        go_name: release

      - java_method: reset
        params: []
        returns: void
        go_name: reset

callbacks:
  - java_interface: android.media.MediaPlayer$OnCompletionListener
    go_type: onCompletionListener
    methods:
      - { java_method: onCompletion, params: [android.media.MediaPlayer], go_field: OnCompletion }

  - java_interface: android.media.MediaPlayer$OnErrorListener
    go_type: onErrorListener
    methods:
      - { java_method: onError, params: [android.media.MediaPlayer, int, int], go_field: OnError, returns: boolean }

  - java_interface: android.media.MediaPlayer$OnPreparedListener
    go_type: onPreparedListener
    methods:
      - { java_method: onPrepared, params: [android.media.MediaPlayer], go_field: OnPrepared }
