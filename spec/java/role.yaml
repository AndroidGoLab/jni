package: role
go_import: github.com/xaionaro-go/jni/app/role
classes:
    - java_class: android.app.role.RoleManager
      go_type: roleManager
      obtain: system_service
      service_name: role
      close: true
      methods:
        - java_method: createRequestRoleIntent
          go_name: CreateRequestRoleIntent
          params:
            - java_type: String
              go_name: arg0
          returns: android.content.Intent
          error: true
        - java_method: isRoleAvailable
          go_name: IsRoleAvailable
          params:
            - java_type: String
              go_name: arg0
          returns: boolean
          error: true
        - java_method: isRoleHeld
          go_name: IsRoleHeld
          params:
            - java_type: String
              go_name: arg0
          returns: boolean
          error: true
constants:
    - go_name: RoleAssistant
      value: '"android.app.role.ASSISTANT"'
      go_type: string
    - go_name: RoleBrowser
      value: '"android.app.role.BROWSER"'
      go_type: string
    - go_name: RoleCallRedirection
      value: '"android.app.role.CALL_REDIRECTION"'
      go_type: string
    - go_name: RoleCallScreening
      value: '"android.app.role.CALL_SCREENING"'
      go_type: string
    - go_name: RoleDialer
      value: '"android.app.role.DIALER"'
      go_type: string
    - go_name: RoleEmergency
      value: '"android.app.role.EMERGENCY"'
      go_type: string
    - go_name: RoleHome
      value: '"android.app.role.HOME"'
      go_type: string
    - go_name: RoleNotes
      value: '"android.app.role.NOTES"'
      go_type: string
    - go_name: RoleSms
      value: '"android.app.role.SMS"'
      go_type: string
    - go_name: RoleWallet
      value: '"android.app.role.WALLET"'
      go_type: string
