package: keystore
go_import: "github.com/xaionaro-go/jni/security/keystore"

classes:
  - java_class: java.security.KeyStore
    go_type: keyStoreJava
    obtain: static_method
    static_method: getInstance
    static_method_params: [{ java_type: String, value: '"AndroidKeyStore"' }]

    methods:
      - java_method: load
        params: [{ java_type: java.security.KeyStore.LoadStoreParameter, go_name: param, nullable: true }]
        returns: void
        go_name: load
        error: true

      - java_method: containsAlias
        params: [{ java_type: String, go_name: alias }]
        returns: boolean
        go_name: containsAlias
        error: true

      - java_method: deleteEntry
        params: [{ java_type: String, go_name: alias }]
        returns: void
        go_name: deleteEntry
        error: true

      - java_method: aliases
        params: []
        returns: java.util.Enumeration
        go_name: aliasesRaw
        error: true

      - java_method: getEntry
        params:
          - { java_type: String, go_name: alias }
          - { java_type: java.security.KeyStore.ProtectionParameter, go_name: param, nullable: true }
        returns: java.security.KeyStore.Entry
        go_name: getEntry
        error: true

  - java_class: android.security.keystore.KeyGenParameterSpec.Builder
    go_type: keyGenParamBuilder
    kind: builder
    obtain: constructor
    constructor_params:
      - { java_type: String, go_name: keystoreAlias }
      - { java_type: int, go_name: purposes }

    methods:
      - java_method: setKeySize
        params: [{ java_type: int, go_name: keySize }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setKeySize

      - java_method: setBlockModes
        params: [{ java_type: "String[]", go_name: blockModes }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setBlockModes

      - java_method: setEncryptionPaddings
        params: [{ java_type: "String[]", go_name: paddings }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setEncryptionPaddings

      - java_method: setSignaturePaddings
        params: [{ java_type: "String[]", go_name: paddings }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setSignaturePaddings

      - java_method: setDigests
        params: [{ java_type: "String[]", go_name: digests }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setDigests

      - java_method: setUserAuthenticationRequired
        params: [{ java_type: boolean, go_name: required }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setUserAuthenticationRequired

      - java_method: setUserAuthenticationValidityDurationSeconds
        params: [{ java_type: int, go_name: seconds }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setUserAuthenticationValidityDurationSeconds

      - java_method: setInvalidatedByBiometricEnrollment
        params: [{ java_type: boolean, go_name: invalidated }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setInvalidatedByBiometricEnrollment

      - java_method: setUnlockedDeviceRequired
        params: [{ java_type: boolean, go_name: required }]
        returns: android.security.keystore.KeyGenParameterSpec.Builder
        go_name: setUnlockedDeviceRequired
        min_api: 28

      - java_method: build
        params: []
        returns: android.security.keystore.KeyGenParameterSpec
        go_name: build

  - java_class: javax.crypto.KeyGenerator
    go_type: keyGeneratorJava
    obtain: static_method
    static_method: getInstance
    static_method_params:
      - { java_type: String, go_name: algorithm }
      - { java_type: String, value: '"AndroidKeyStore"' }

    methods:
      - java_method: init
        params: [{ java_type: java.security.spec.AlgorithmParameterSpec, go_name: params }]
        returns: void
        go_name: init
        error: true

      - java_method: generateKey
        params: []
        returns: javax.crypto.SecretKey
        go_name: generateKey
        error: true

  - java_class: java.security.KeyPairGenerator
    go_type: keyPairGeneratorJava
    obtain: static_method
    static_method: getInstance
    static_method_params:
      - { java_type: String, go_name: algorithm }
      - { java_type: String, value: '"AndroidKeyStore"' }

    methods:
      - java_method: initialize
        params: [{ java_type: java.security.spec.AlgorithmParameterSpec, go_name: params }]
        returns: void
        go_name: initialize
        error: true

      - java_method: generateKeyPair
        params: []
        returns: java.security.KeyPair
        go_name: generateKeyPair
        error: true

  - java_class: javax.crypto.Cipher
    go_type: cipherJava
    obtain: static_method
    static_method: getInstance
    static_method_params:
      - { java_type: String, go_name: transformation }

    methods:
      - java_method: init
        params:
          - { java_type: int, go_name: opmode }
          - { java_type: java.security.Key, go_name: key }
        returns: void
        go_name: initWithKey
        error: true

      - java_method: init
        params:
          - { java_type: int, go_name: opmode }
          - { java_type: java.security.Key, go_name: key }
          - { java_type: java.security.spec.AlgorithmParameterSpec, go_name: params }
        returns: void
        go_name: initWithKeyAndParams
        error: true
        overload_id: init_with_params

      - java_method: doFinal
        params: [{ java_type: "byte[]", go_name: input }]
        returns: "byte[]"
        go_name: doFinal
        error: true

      - java_method: getIV
        params: []
        returns: "byte[]"
        go_name: getIV
        error: true

  - java_class: java.security.Signature
    go_type: signatureJava
    obtain: static_method
    static_method: getInstance
    static_method_params:
      - { java_type: String, go_name: algorithm }

    methods:
      - java_method: initSign
        params: [{ java_type: java.security.PrivateKey, go_name: privateKey }]
        returns: void
        go_name: initSign
        error: true

      - java_method: initVerify
        params: [{ java_type: java.security.PublicKey, go_name: publicKey }]
        returns: void
        go_name: initVerify
        error: true

      - java_method: update
        params: [{ java_type: "byte[]", go_name: data }]
        returns: void
        go_name: update
        error: true

      - java_method: sign
        params: []
        returns: "byte[]"
        go_name: sign
        error: true

      - java_method: verify
        params: [{ java_type: "byte[]", go_name: signature }]
        returns: boolean
        go_name: verify
        error: true

  # GCMParameterSpec for AES-GCM decryption (provides IV)
  - java_class: javax.crypto.spec.GCMParameterSpec
    go_type: gcmParamSpec
    obtain: constructor
    constructor_params:
      - { java_type: int, go_name: tagLen }
      - { java_type: "byte[]", go_name: iv }

constants:
  - go_name: PurposeEncrypt
    value: 1
    go_type: int
    java_source: android.security.keystore.KeyProperties.PURPOSE_ENCRYPT
  - go_name: PurposeDecrypt
    value: 2
    go_type: int
    java_source: android.security.keystore.KeyProperties.PURPOSE_DECRYPT
  - go_name: PurposeSign
    value: 4
    go_type: int
    java_source: android.security.keystore.KeyProperties.PURPOSE_SIGN
  - go_name: PurposeVerify
    value: 8
    go_type: int
    java_source: android.security.keystore.KeyProperties.PURPOSE_VERIFY
