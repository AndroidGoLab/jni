package: job
go_import: "github.com/xaionaro-go/jni/app/job"

classes:
  - java_class: android.app.job.JobScheduler
    go_type: Scheduler
    obtain: system_service
    service_name: "jobscheduler"
    close: true

    methods:
      - java_method: schedule
        params: [{ java_type: android.app.job.JobInfo, go_name: job }]
        returns: int
        go_name: scheduleRaw
        error: true

      - java_method: cancel
        params: [{ java_type: int, go_name: jobId }]
        returns: void
        go_name: Cancel
        error: true

      - java_method: cancelAll
        params: []
        returns: void
        go_name: CancelAll
        error: true

      - java_method: getPendingJob
        params: [{ java_type: int, go_name: jobId }]
        returns: android.app.job.JobInfo
        go_name: getPendingJobRaw
        error: true

      - java_method: getAllPendingJobs
        params: []
        returns: java.util.List
        go_name: getAllPendingJobsRaw
        error: true

  - java_class: android.app.job.JobInfo
    go_type: jobInfoJava
    kind: data_class
    fields:
      - { java_method: getId, returns: int, go_name: ID, go_type: int32 }
      - { java_method: getService, returns: android.content.ComponentName, go_name: Service, go_type: "*jni.Object" }
      - { java_method: getNetworkType, returns: int, go_name: NetworkType, go_type: int }
      - { java_method: isRequireCharging, returns: boolean, go_name: RequireCharging, go_type: bool }
      - { java_method: isRequireDeviceIdle, returns: boolean, go_name: RequireDeviceIdle, go_type: bool }
      - { java_method: isRequireBatteryNotLow, returns: boolean, go_name: RequireBatteryNotLow, go_type: bool }
      - { java_method: isRequireStorageNotLow, returns: boolean, go_name: RequireStorageNotLow, go_type: bool }
      - { java_method: getIntervalMillis, returns: long, go_name: IntervalMillis, go_type: int64 }
      - { java_method: getMinLatencyMillis, returns: long, go_name: MinLatencyMillis, go_type: int64 }
      - { java_method: getMaxExecutionDelayMillis, returns: long, go_name: MaxDelayMillis, go_type: int64 }
      - { java_method: isPersisted, returns: boolean, go_name: Persisted, go_type: bool }
      - { java_method: getInitialBackoffMillis, returns: long, go_name: InitialBackoffMillis, go_type: int64 }
      - { java_method: getBackoffPolicy, returns: int, go_name: BackoffPolicy, go_type: int }

  - java_class: android.app.job.JobInfo.Builder
    go_type: jobInfoBuilder
    kind: builder
    obtain: constructor
    constructor_params:
      - { java_type: int, go_name: jobId }
      - { java_type: android.content.ComponentName, go_name: jobService }

    methods:
      - java_method: setRequiredNetworkType
        params: [{ java_type: int, go_name: networkType }]
        returns: android.app.job.JobInfo.Builder
        go_name: setRequiredNetworkType

      - java_method: setRequiresCharging
        params: [{ java_type: boolean, go_name: requiresCharging }]
        returns: android.app.job.JobInfo.Builder
        go_name: setRequiresCharging

      - java_method: setRequiresDeviceIdle
        params: [{ java_type: boolean, go_name: requiresDeviceIdle }]
        returns: android.app.job.JobInfo.Builder
        go_name: setRequiresDeviceIdle

      - java_method: setRequiresBatteryNotLow
        params: [{ java_type: boolean, go_name: requiresBatteryNotLow }]
        returns: android.app.job.JobInfo.Builder
        go_name: setRequiresBatteryNotLow

      - java_method: setRequiresStorageNotLow
        params: [{ java_type: boolean, go_name: requiresStorageNotLow }]
        returns: android.app.job.JobInfo.Builder
        go_name: setRequiresStorageNotLow

      - java_method: setPeriodic
        params: [{ java_type: long, go_name: intervalMillis }]
        returns: android.app.job.JobInfo.Builder
        go_name: setPeriodic

      - java_method: setMinimumLatency
        params: [{ java_type: long, go_name: minLatencyMillis }]
        returns: android.app.job.JobInfo.Builder
        go_name: setMinimumLatency

      - java_method: setOverrideDeadline
        params: [{ java_type: long, go_name: maxExecutionDelayMillis }]
        returns: android.app.job.JobInfo.Builder
        go_name: setOverrideDeadline

      - java_method: setPersisted
        params: [{ java_type: boolean, go_name: isPersisted }]
        returns: android.app.job.JobInfo.Builder
        go_name: setPersisted

      - java_method: setBackoffCriteria
        params:
          - { java_type: long, go_name: initialBackoffMillis }
          - { java_type: int, go_name: backoffPolicy }
        returns: android.app.job.JobInfo.Builder
        go_name: setBackoffCriteria

      - java_method: build
        params: []
        returns: android.app.job.JobInfo
        go_name: build

constants:
  - go_name: ResultSuccess
    value: 1
    go_type: int
    java_source: android.app.job.JobScheduler.RESULT_SUCCESS
  - go_name: ResultFailure
    value: 0
    go_type: int
    java_source: android.app.job.JobScheduler.RESULT_FAILURE
  - go_name: NetworkNone
    value: 0
    go_type: int
    java_source: android.app.job.JobInfo.NETWORK_TYPE_NONE
  - go_name: NetworkAny
    value: 1
    go_type: int
    java_source: android.app.job.JobInfo.NETWORK_TYPE_ANY
  - go_name: NetworkUnmetered
    value: 2
    go_type: int
    java_source: android.app.job.JobInfo.NETWORK_TYPE_UNMETERED
  - go_name: NetworkNotRoaming
    value: 3
    go_type: int
    java_source: android.app.job.JobInfo.NETWORK_TYPE_NOT_ROAMING
  - go_name: NetworkCellular
    value: 4
    go_type: int
    java_source: android.app.job.JobInfo.NETWORK_TYPE_CELLULAR
  - go_name: BackoffPolicyLinear
    value: 0
    go_type: int
    java_source: android.app.job.JobInfo.BACKOFF_POLICY_LINEAR
  - go_name: BackoffPolicyExponential
    value: 1
    go_type: int
    java_source: android.app.job.JobInfo.BACKOFF_POLICY_EXPONENTIAL
