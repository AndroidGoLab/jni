package: omapi
go_import: github.com/xaionaro-go/jni/se/omapi
classes:
    - java_class: android.se.omapi.SEService
      go_type: sEService
      methods:
        - java_method: getReaders
          go_name: GetReaders
          returns: android.se.omapi.Reader[]
          error: true
        - java_method: getUiccReader
          go_name: GetUiccReader
          params:
            - java_type: int
              go_name: arg0
          returns: android.se.omapi.Reader
          error: true
        - java_method: getVersion
          go_name: GetVersion
          returns: String
          error: true
        - java_method: isConnected
          go_name: IsConnected
          returns: boolean
          error: true
        - java_method: shutdown
          go_name: Shutdown
          returns: void
          error: true
constants:
    - go_name: ActionSecureElementStateChanged
      value: '""'
      go_type: string
    - go_name: ExtraReaderName
      value: '""'
      go_type: string
    - go_name: ExtraReaderState
      value: '""'
      go_type: string
