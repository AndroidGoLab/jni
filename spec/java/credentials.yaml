package: credentials
go_import: github.com/AndroidGoLab/jni/credentials
classes:
    - java_class: androidx.credentials.CredentialManager
      go_type: Manager
      methods:
        # getCredential, createCredential, clearCredentialState are Kotlin
        # suspend functions and cannot be called directly via JNI (they
        # require a kotlin.coroutines.Continuation parameter). Use the
        # Jetpack CredentialManager compat / callback APIs instead.
      static_methods:
        - java_method: create
          go_name: createManagerRaw
          params:
            - java_type: android.content.Context
              go_name: context
          returns: androidx.credentials.CredentialManager
          error: true
    - java_class: androidx.credentials.GetCredentialRequest$Builder
      go_type: getCredentialRequestBuilder
      obtain: constructor
      methods:
        - java_method: addCredentialOption
          go_name: addCredentialOption
          params:
            - java_type: androidx.credentials.CredentialOption
              go_name: option
          returns: androidx.credentials.GetCredentialRequest$Builder
          error: true
        - java_method: build
          go_name: build
          returns: androidx.credentials.GetCredentialRequest
          error: true
    - java_class: androidx.credentials.GetCredentialResponse
      go_type: getCredentialResponse
      methods: []
    - java_class: androidx.credentials.PasswordCredential
      go_type: PasswordCredential
      methods:
        - java_method: getId
          go_name: ID
          returns: String
          error: true
        - java_method: getPassword
          go_name: Password
          returns: String
          error: true
    - java_class: androidx.credentials.PublicKeyCredential
      go_type: PublicKeyCredential
      methods:
        - java_method: getAuthenticationResponseJson
          go_name: AuthResponseJSON
          returns: String
          error: true
