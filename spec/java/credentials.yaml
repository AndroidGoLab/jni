package: credentials
go_import: "github.com/xaionaro-go/jni/credentials"

classes:
  - java_class: androidx.credentials.CredentialManager
    go_type: Manager
    obtain: static_factory
    close: false
    methods:
      - java_method: create
        go_name: createManagerRaw
        static: true
        params:
          - { java_type: android.content.Context, go_name: ctx }
        returns: androidx.credentials.CredentialManager
        error: true

      - java_method: getCredential
        go_name: getCredentialRaw
        params:
          - { java_type: android.content.Context, go_name: ctx }
          - { java_type: androidx.credentials.GetCredentialRequest, go_name: request }
        returns: androidx.credentials.GetCredentialResponse
        error: true

      - java_method: createCredential
        go_name: createCredentialRaw
        params:
          - { java_type: android.content.Context, go_name: ctx }
          - { java_type: androidx.credentials.CreateCredentialRequest, go_name: request }
        returns: androidx.credentials.CreateCredentialResponse
        error: true

      - java_method: clearCredentialState
        go_name: clearCredentialStateRaw
        params:
          - { java_type: androidx.credentials.ClearCredentialStateRequest, go_name: request }
        returns: void
        error: true

  - java_class: androidx.credentials.GetCredentialRequest$Builder
    go_type: getCredentialRequestBuilder
    kind: builder
    methods:
      - java_method: addCredentialOption
        go_name: addCredentialOption
        params:
          - { java_type: androidx.credentials.CredentialOption, go_name: option }
        returns: androidx.credentials.GetCredentialRequest$Builder

      - java_method: build
        go_name: build
        params: []
        returns: androidx.credentials.GetCredentialRequest

  - java_class: androidx.credentials.GetCredentialResponse
    go_type: getCredentialResponse
    kind: data_class
    methods:
      - java_method: getCredential
        go_name: getCredential
        params: []
        returns: androidx.credentials.Credential
        error: true

  - java_class: androidx.credentials.PasswordCredential
    go_type: PasswordCredential
    kind: data_class
    fields:
      - { java_method: getId, returns: String, go_name: ID, go_type: string }
      - { java_method: getPassword, returns: String, go_name: Password, go_type: string }

  - java_class: androidx.credentials.publickeycredential.PublicKeyCredential
    go_type: PublicKeyCredential
    kind: data_class
    fields:
      - { java_method: getAuthenticationResponseJson, returns: String, go_name: AuthResponseJSON, go_type: string }

constants: []
callbacks: []
