package: settings
go_import: "github.com/xaionaro-go/jni/provider/settings"

classes:
  - java_class: android.provider.Settings$System
    go_type: settingsSystem  # unexported
    static_methods:
      - java_method: getInt
        params:
          - { java_type: android.content.ContentResolver, go_name: resolver }
          - { java_type: String, go_name: name }
          - { java_type: int, go_name: def }
        returns: int
        go_name: getIntSystem

      - java_method: putInt
        params:
          - { java_type: android.content.ContentResolver, go_name: resolver }
          - { java_type: String, go_name: name }
          - { java_type: int, go_name: value }
        returns: boolean
        go_name: putIntSystem

      - java_method: getString
        params:
          - { java_type: android.content.ContentResolver, go_name: resolver }
          - { java_type: String, go_name: name }
        returns: String
        go_name: getStringSystem

  - java_class: android.provider.Settings$Secure
    go_type: settingsSecure  # unexported
    static_methods:
      - java_method: getInt
        params:
          - { java_type: android.content.ContentResolver, go_name: resolver }
          - { java_type: String, go_name: name }
          - { java_type: int, go_name: def }
        returns: int
        go_name: getIntSecure

      - java_method: getString
        params:
          - { java_type: android.content.ContentResolver, go_name: resolver }
          - { java_type: String, go_name: name }
        returns: String
        go_name: getStringSecure

  - java_class: android.provider.Settings$Global
    go_type: settingsGlobal  # unexported
    static_methods:
      - java_method: getInt
        params:
          - { java_type: android.content.ContentResolver, go_name: resolver }
          - { java_type: String, go_name: name }
          - { java_type: int, go_name: def }
        returns: int
        go_name: getIntGlobal

      - java_method: getString
        params:
          - { java_type: android.content.ContentResolver, go_name: resolver }
          - { java_type: String, go_name: name }
        returns: String
        go_name: getStringGlobal

constants:
  # Namespaces
  - { go_name: System, value: '"system"', go_type: string }
  - { go_name: Secure, value: '"secure"', go_type: string }
  - { go_name: Global, value: '"global"', go_type: string }
  # Common keys
  - { go_name: ScreenBrightness, value: '"screen_brightness"', go_type: string }
  - { go_name: AndroidID, value: '"android_id"', go_type: string }

callbacks: []
