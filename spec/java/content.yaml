package: content
go_import: github.com/xaionaro-go/jni/content
classes:
    - java_class: android.content.BroadcastReceiver
      go_type: broadcastReceiver
      methods:
        - java_method: getSentFromPackage
          go_name: GetSentFromPackage
          returns: String
          error: true
        - java_method: getSentFromUid
          go_name: GetSentFromUid
          returns: int
          error: true
        - java_method: peekService
          go_name: PeekService
          params:
            - java_type: android.content.Context
              go_name: arg0
            - java_type: android.content.Intent
              go_name: arg1
          returns: android.os.IBinder
          error: true
