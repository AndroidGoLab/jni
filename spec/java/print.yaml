package: print
go_import: github.com/xaionaro-go/jni/print
classes:
    - java_class: android.print.PrintManager
      go_type: printManager
      obtain: system_service
      service_name: print
      close: true
      methods:
        - java_method: getPrintJobs
          go_name: GetPrintJobs
          returns: java.util.List<android.print.PrintJob>
          error: true
        - java_method: isPrintServiceEnabled
          go_name: IsPrintServiceEnabled
          params:
            - java_type: android.content.ComponentName
              go_name: arg0
          returns: boolean
          error: true
        - java_method: print
          go_name: Print
          params:
            - java_type: String
              go_name: arg0
            - java_type: android.print.PrintDocumentAdapter
              go_name: arg1
            - java_type: android.print.PrintAttributes
              go_name: arg2
          returns: android.print.PrintJob
          error: true
