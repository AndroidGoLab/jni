package: print
go_import: "github.com/xaionaro-go/jni/print"

classes:
  - java_class: android.print.PrintManager
    go_type: Manager
    obtain: system_service
    service_name: "print"
    close: false
    methods:
      - java_method: getPrintJobs
        go_name: getPrintJobsRaw
        params: []
        returns: java.util.List
        error: true

      - java_method: print
        go_name: printRaw
        params:
          - { java_type: String, go_name: jobName }
          - { java_type: android.print.PrintDocumentAdapter, go_name: adapter }
          - { java_type: android.print.PrintAttributes, go_name: attributes }
        returns: android.print.PrintJob
        error: true

  - java_class: android.print.PrintJob
    go_type: printJob
    kind: data_class
    fields:
      - { java_method: getInfo, returns: android.print.PrintJobInfo, go_name: Info, go_type: printJobInfo }
    methods:
      - java_method: getId
        go_name: getIdRaw
        params: []
        returns: android.print.PrintJobId
        error: true

  - java_class: android.print.PrintJobInfo
    go_type: printJobInfo
    kind: data_class
    fields:
      - { java_method: getLabel, returns: String, go_name: Label, go_type: string }
      - { java_method: getState, returns: int, go_name: State, go_type: JobState }

constants:
  - { go_name: JobCreated, value: 1, go_type: JobState }
  - { go_name: JobQueued, value: 2, go_type: JobState }
  - { go_name: JobStarted, value: 3, go_type: JobState }
  - { go_name: JobBlocked, value: 4, go_type: JobState }
  - { go_name: JobCompleted, value: 5, go_type: JobState }
  - { go_name: JobFailed, value: 6, go_type: JobState }
  - { go_name: JobCanceled, value: 7, go_type: JobState }

callbacks: []
