package: ir
go_import: "github.com/xaionaro-go/jni/hardware/ir"

classes:
  - java_class: android.hardware.ConsumerIrManager
    go_type: Manager
    obtain: system_service
    service_name: "consumer_ir"
    close: false
    methods:
      - java_method: hasIrEmitter
        go_name: HasIrEmitter
        params: []
        returns: boolean
        error: true

      - java_method: getCarrierFrequencies
        go_name: getCarrierFrequenciesRaw
        params: []
        returns: "android.hardware.ConsumerIrManager$CarrierFrequencyRange[]"
        error: true

      - java_method: transmit
        go_name: Transmit
        params:
          - { java_type: int, go_name: carrierFrequency }
          - { java_type: "int[]", go_name: pattern }
        returns: void
        error: true

  - java_class: android.hardware.ConsumerIrManager$CarrierFrequencyRange
    go_type: frequencyRange
    kind: data_class
    fields:
      - { java_method: getMinFrequency, returns: int, go_name: MinFrequency, go_type: int }
      - { java_method: getMaxFrequency, returns: int, go_name: MaxFrequency, go_type: int }

constants: []
callbacks: []
