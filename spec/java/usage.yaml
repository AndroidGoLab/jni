package: usage
go_import: "github.com/xaionaro-go/jni/app/usage"

classes:
  - java_class: android.app.usage.UsageStatsManager
    go_type: Manager
    obtain: system_service
    service_name: "usagestats"
    close: false
    methods:
      - java_method: queryUsageStats
        go_name: queryUsageStatsRaw
        params:
          - { java_type: int, go_name: intervalType }
          - { java_type: long, go_name: beginTime }
          - { java_type: long, go_name: endTime }
        returns: java.util.List
        error: true

      - java_method: isAppInactive
        go_name: IsAppInactive
        params:
          - { java_type: String, go_name: packageName }
        returns: boolean
        error: true

      - java_method: getAppStandbyBucket
        go_name: GetAppStandbyBucket
        params: []
        returns: int
        error: true

  - java_class: android.app.usage.UsageStats
    go_type: Stats
    kind: data_class
    fields:
      - { java_method: getPackageName, returns: String, go_name: PackageName, go_type: string }
      - { java_method: getFirstTimeStamp, returns: long, go_name: FirstTimestamp, go_type: int64 }
      - { java_method: getLastTimeStamp, returns: long, go_name: LastTimestamp, go_type: int64 }
      - { java_method: getTotalTimeVisible, returns: long, go_name: TotalTimeVisible, go_type: int64 }
      - { java_method: getTotalTimeInForeground, returns: long, go_name: TotalTimeForeground, go_type: int64 }

constants:
  - { go_name: Daily, value: 0, go_type: Interval }
  - { go_name: Weekly, value: 1, go_type: Interval }
  - { go_name: Monthly, value: 2, go_type: Interval }
  - { go_name: Yearly, value: 3, go_type: Interval }

  # Standby buckets
  - { go_name: StandbyActive, value: 10, go_type: int }
  - { go_name: StandbyWorkingSet, value: 20, go_type: int }
  - { go_name: StandbyFrequent, value: 30, go_type: int }
  - { go_name: StandbyRare, value: 40, go_type: int }
  - { go_name: StandbyRestricted, value: 45, go_type: int }

callbacks: []
