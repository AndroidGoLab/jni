package: preferences
go_import: "github.com/xaionaro-go/jni/content/preferences"

classes:
  - java_class: android.content.SharedPreferences
    go_type: Preferences
    obtain: context_method
    context_method: getSharedPreferences
    context_params:
      - { java_type: String, go_name: name }
      - { java_type: int, go_name: mode, default: 0 }  # MODE_PRIVATE = 0
    close: true

    methods:
      - { java_method: getString, params: [{ java_type: String, go_name: key }, { java_type: String, go_name: defaultVal }], returns: String, go_name: GetString, error: true }
      - { java_method: getInt, params: [{ java_type: String, go_name: key }, { java_type: int, go_name: defaultVal }], returns: int, go_name: GetInt, error: true }
      - { java_method: getBoolean, params: [{ java_type: String, go_name: key }, { java_type: boolean, go_name: defaultVal }], returns: boolean, go_name: GetBool, error: true }
      - { java_method: getFloat, params: [{ java_type: String, go_name: key }, { java_type: float, go_name: defaultVal }], returns: float, go_name: GetFloat, error: true }
      - { java_method: getLong, params: [{ java_type: String, go_name: key }, { java_type: long, go_name: defaultVal }], returns: long, go_name: GetLong, error: true }
      - { java_method: contains, params: [{ java_type: String, go_name: key }], returns: boolean, go_name: Contains, error: true }

      # Editor access (internal, overlay wraps each Put into put+apply)
      - java_method: edit
        returns: android.content.SharedPreferences.Editor
        go_name: edit  # internal
        error: true

  - java_class: android.content.SharedPreferences$Editor
    go_type: editor  # unexported
    methods:
      - { java_method: putString, params: [{ java_type: String, go_name: key }, { java_type: String, go_name: value }], returns: android.content.SharedPreferences.Editor, go_name: putString }
      - { java_method: putInt, params: [{ java_type: String, go_name: key }, { java_type: int, go_name: value }], returns: android.content.SharedPreferences.Editor, go_name: putInt }
      - { java_method: putBoolean, params: [{ java_type: String, go_name: key }, { java_type: boolean, go_name: value }], returns: android.content.SharedPreferences.Editor, go_name: putBoolean }
      - { java_method: putFloat, params: [{ java_type: String, go_name: key }, { java_type: float, go_name: value }], returns: android.content.SharedPreferences.Editor, go_name: putFloat }
      - { java_method: putLong, params: [{ java_type: String, go_name: key }, { java_type: long, go_name: value }], returns: android.content.SharedPreferences.Editor, go_name: putLong }
      - { java_method: remove, params: [{ java_type: String, go_name: key }], returns: android.content.SharedPreferences.Editor, go_name: remove }
      - { java_method: clear, returns: android.content.SharedPreferences.Editor, go_name: clear }
      - { java_method: apply, returns: void, go_name: apply }

constants: []
callbacks: []
