package: clipboard
go_import: github.com/xaionaro-go/jni/content/clipboard
classes:
    - java_class: android.content.ClipboardManager
      go_type: clipboardManager
      obtain: system_service
      service_name: clipboard
      close: true
      methods:
        - java_method: addPrimaryClipChangedListener
          go_name: AddPrimaryClipChangedListener
          params:
            - java_type: android.content.ClipboardManager$OnPrimaryClipChangedListener
              go_name: arg0
          returns: void
          error: true
        - java_method: clearPrimaryClip
          go_name: ClearPrimaryClip
          returns: void
          error: true
        - java_method: getPrimaryClip
          go_name: GetPrimaryClip
          returns: android.content.ClipData
          error: true
        - java_method: getPrimaryClipDescription
          go_name: GetPrimaryClipDescription
          returns: android.content.ClipDescription
          error: true
        - java_method: getText
          go_name: GetText
          returns: String
          error: true
        - java_method: hasPrimaryClip
          go_name: HasPrimaryClip
          returns: boolean
          error: true
        - java_method: hasText
          go_name: HasText
          returns: boolean
          error: true
        - java_method: removePrimaryClipChangedListener
          go_name: RemovePrimaryClipChangedListener
          params:
            - java_type: android.content.ClipboardManager$OnPrimaryClipChangedListener
              go_name: arg0
          returns: void
          error: true
        - java_method: setPrimaryClip
          go_name: SetPrimaryClip
          params:
            - java_type: android.content.ClipData
              go_name: arg0
          returns: void
          error: true
        - java_method: setText
          go_name: SetText
          params:
            - java_type: String
              go_name: arg0
          returns: void
          error: true
