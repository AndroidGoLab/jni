package: recorder
go_import: "github.com/xaionaro-go/jni/media/recorder"

classes:
  - java_class: android.media.MediaRecorder
    go_type: Recorder
    obtain: constructor
    constructor_params:
      - { java_type: android.content.Context, go_name: ctx }
    close: false

    methods:
      - java_method: setAudioSource
        params: [{ java_type: int, go_name: audioSource }]
        returns: void
        go_name: setAudioSource
        error: true

      - java_method: setVideoSource
        params: [{ java_type: int, go_name: videoSource }]
        returns: void
        go_name: setVideoSource
        error: true

      - java_method: setOutputFormat
        params: [{ java_type: int, go_name: outputFormat }]
        returns: void
        go_name: setOutputFormat
        error: true

      - java_method: setAudioEncoder
        params: [{ java_type: int, go_name: audioEncoder }]
        returns: void
        go_name: setAudioEncoder
        error: true

      - java_method: setVideoEncoder
        params: [{ java_type: int, go_name: videoEncoder }]
        returns: void
        go_name: setVideoEncoder
        error: true

      - java_method: setOutputFile
        params: [{ java_type: String, go_name: path }]
        returns: void
        go_name: setOutputFile
        error: true

      - java_method: setVideoSize
        params:
          - { java_type: int, go_name: width }
          - { java_type: int, go_name: height }
        returns: void
        go_name: setVideoSize
        error: true

      - java_method: setVideoFrameRate
        params: [{ java_type: int, go_name: rate }]
        returns: void
        go_name: setVideoFrameRate
        error: true

      - java_method: setAudioSamplingRate
        params: [{ java_type: int, go_name: samplingRate }]
        returns: void
        go_name: setAudioSamplingRate
        error: true

      - java_method: setAudioChannels
        params: [{ java_type: int, go_name: numChannels }]
        returns: void
        go_name: setAudioChannels
        error: true

      - java_method: setMaxDuration
        params: [{ java_type: int, go_name: maxDurationMs }]
        returns: void
        go_name: setMaxDurationMs
        error: true

      - java_method: setMaxFileSize
        params: [{ java_type: long, go_name: maxFileSize }]
        returns: void
        go_name: setMaxFileSize
        error: true

      - java_method: prepare
        params: []
        returns: void
        go_name: prepare
        error: true

      - java_method: start
        params: []
        returns: void
        go_name: start
        error: true

      - java_method: pause
        params: []
        returns: void
        go_name: pause
        error: true

      - java_method: resume
        params: []
        returns: void
        go_name: resume
        error: true

      - java_method: stop
        params: []
        returns: void
        go_name: stop
        error: true

      - java_method: reset
        params: []
        returns: void
        go_name: reset
        error: true

      - java_method: release
        params: []
        returns: void
        go_name: release

      - java_method: getMaxAmplitude
        params: []
        returns: int
        go_name: getMaxAmplitude
        error: true

      - java_method: setOnErrorListener
        params: [{ java_type: android.media.MediaRecorder$OnErrorListener, go_name: listener }]
        returns: void
        go_name: setOnErrorListener

      - java_method: setOnInfoListener
        params: [{ java_type: android.media.MediaRecorder$OnInfoListener, go_name: listener }]
        returns: void
        go_name: setOnInfoListener

callbacks:
  - java_interface: android.media.MediaRecorder$OnErrorListener
    go_type: onErrorListener
    methods:
      - { java_method: onError, params: [android.media.MediaRecorder, int, int], go_field: OnError }

  - java_interface: android.media.MediaRecorder$OnInfoListener
    go_type: onInfoListener
    methods:
      - { java_method: onInfo, params: [android.media.MediaRecorder, int, int], go_field: OnInfo }

constants:
  # AudioSource
  - { go_name: AudioMic, value: "1", go_type: int }
  - { go_name: AudioVoiceCall, value: "4", go_type: int }
  - { go_name: AudioCamcorder, value: "5", go_type: int }
  - { go_name: AudioVoiceComm, value: "7", go_type: int }
  - { go_name: AudioUnprocessed, value: "9", go_type: int }
  # VideoSource
  - { go_name: VideoCamera, value: "1", go_type: int }
  - { go_name: VideoSurface, value: "2", go_type: int }
  # OutputFormat
  - { go_name: FormatMPEG4, value: "2", go_type: int }
  - { go_name: FormatThreeGPP, value: "1", go_type: int }
  - { go_name: FormatWebM, value: "9", go_type: int }
  - { go_name: FormatAAC_ADTS, value: "6", go_type: int }
  - { go_name: FormatOGG, value: "11", go_type: int }
