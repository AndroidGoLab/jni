package: net
go_import: "github.com/xaionaro-go/jni/net"

classes:
  - java_class: android.net.ConnectivityManager
    go_type: Manager
    obtain: system_service
    service_name: "connectivity"
    close: true

    methods:
      - java_method: getActiveNetwork
        params: []
        returns: android.net.Network
        go_name: getActiveNetworkRaw
        error: true

      - java_method: getNetworkCapabilities
        params: [{ java_type: android.net.Network, go_name: network }]
        returns: android.net.NetworkCapabilities
        go_name: getNetworkCapabilitiesRaw
        error: true

      - java_method: registerDefaultNetworkCallback
        params: [{ java_type: android.net.ConnectivityManager$NetworkCallback, go_name: callback }]
        returns: void
        go_name: registerDefaultNetworkCallbackRaw
        error: true

      - java_method: unregisterNetworkCallback
        params: [{ java_type: android.net.ConnectivityManager$NetworkCallback, go_name: callback }]
        returns: void
        go_name: unregisterNetworkCallbackRaw
        error: true

  - java_class: android.net.NetworkCapabilities
    go_type: networkCapabilities  # internal, fields extracted into NetworkInfo
    kind: intermediate

    methods:
      - java_method: hasTransport
        params: [{ java_type: int, go_name: transport }]
        returns: boolean
        go_name: hasTransport

      - java_method: getLinkDownstreamBandwidthKbps
        params: []
        returns: int
        go_name: getLinkDown

      - java_method: getLinkUpstreamBandwidthKbps
        params: []
        returns: int
        go_name: getLinkUp

callbacks:
  - java_interface: android.net.ConnectivityManager$NetworkCallback
    go_type: networkCallback
    abstract_class: true  # NetworkCallback is abstract class
    methods:
      - java_method: onAvailable
        params: [android.net.Network]
        go_field: OnAvailable
      - java_method: onLost
        params: [android.net.Network]
        go_field: OnLost
      - java_method: onCapabilitiesChanged
        params: [android.net.Network, android.net.NetworkCapabilities]
        go_field: OnCapabilitiesChanged

constants:
  # Transport types (values from NetworkCapabilities.TRANSPORT_*)
  - go_name: TransportCellular
    value: "0"
    go_type: Transport
    go_underlying: int
  - go_name: TransportWiFi
    value: "1"
    go_type: Transport
    go_underlying: int
  - go_name: TransportBluetooth
    value: "2"
    go_type: Transport
    go_underlying: int
  - go_name: TransportVPN
    value: "4"
    go_type: Transport
    go_underlying: int
