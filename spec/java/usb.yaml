package: usb
go_import: "github.com/xaionaro-go/jni/hardware/usb"

classes:
  # ---------- android.hardware.usb.UsbManager ----------
  - java_class: android.hardware.usb.UsbManager
    go_type: Manager
    obtain: system_service
    service_name: "usb"
    close: true
    methods:
      - java_method: getDeviceList
        go_name: getDeviceList
        params: []
        returns: java.util.HashMap
        error: true

      - java_method: hasPermission
        go_name: hasPermission
        params:
          - java_type: android.hardware.usb.UsbDevice
            go_name: device
        returns: boolean
        error: true

      - java_method: requestPermission
        go_name: requestPermission
        params:
          - java_type: android.hardware.usb.UsbDevice
            go_name: device
          - java_type: android.app.PendingIntent
            go_name: pendingIntent
        returns: void
        error: true

      - java_method: openDevice
        go_name: openDevice
        params:
          - java_type: android.hardware.usb.UsbDevice
            go_name: device
        returns: android.hardware.usb.UsbDeviceConnection
        error: true

  # ---------- android.hardware.usb.UsbDevice ----------
  - java_class: android.hardware.usb.UsbDevice
    go_type: usbDevice
    obtain: constructor
    kind: data_class
    fields:
      - java_method: getDeviceName
        returns: String
        go_name: Name
        go_type: string
      - java_method: getVendorId
        returns: int
        go_name: VendorID
        go_type: int32
      - java_method: getProductId
        returns: int
        go_name: ProductID
        go_type: int32
      - java_method: getDeviceId
        returns: int
        go_name: DeviceID
        go_type: int32
      - java_method: getDeviceClass
        returns: int
        go_name: DeviceClass
        go_type: int32
      - java_method: getDeviceSubclass
        returns: int
        go_name: DeviceSubclass
        go_type: int32
      - java_method: getDeviceProtocol
        returns: int
        go_name: DeviceProtocol
        go_type: int32
      - java_method: getManufacturerName
        returns: String
        go_name: ManufacturerName
        go_type: string
      - java_method: getProductName
        returns: String
        go_name: ProductName
        go_type: string
      - java_method: getSerialNumber
        returns: String
        go_name: SerialNumber
        go_type: string
      - java_method: getInterfaceCount
        returns: int
        go_name: interfaceCount
        go_type: int
    methods:
      - java_method: getInterface
        go_name: getInterface
        params:
          - java_type: int
            go_name: index
        returns: android.hardware.usb.UsbInterface
        error: true

  # ---------- android.hardware.usb.UsbInterface ----------
  - java_class: android.hardware.usb.UsbInterface
    go_type: usbInterface
    obtain: constructor
    kind: data_class
    fields:
      - java_method: getId
        returns: int
        go_name: ID
        go_type: int32
      - java_method: getInterfaceClass
        returns: int
        go_name: Class
        go_type: int32
      - java_method: getInterfaceSubclass
        returns: int
        go_name: Subclass
        go_type: int32
      - java_method: getInterfaceProtocol
        returns: int
        go_name: Protocol
        go_type: int32
      - java_method: getEndpointCount
        returns: int
        go_name: endpointCount
        go_type: int
    methods:
      - java_method: getEndpoint
        go_name: getEndpoint
        params:
          - java_type: int
            go_name: index
        returns: android.hardware.usb.UsbEndpoint
        error: true

  # ---------- android.hardware.usb.UsbEndpoint ----------
  - java_class: android.hardware.usb.UsbEndpoint
    go_type: usbEndpoint
    obtain: constructor
    kind: data_class
    fields:
      - java_method: getAddress
        returns: int
        go_name: Address
        go_type: int32
      - java_method: getDirection
        returns: int
        go_name: Direction
        go_type: int32
      - java_method: getType
        returns: int
        go_name: Type
        go_type: int32
      - java_method: getMaxPacketSize
        returns: int
        go_name: MaxPacket
        go_type: int32

  # ---------- android.hardware.usb.UsbDeviceConnection ----------
  - java_class: android.hardware.usb.UsbDeviceConnection
    go_type: Connection
    obtain: constructor
    close: true
    methods:
      - java_method: claimInterface
        go_name: claimInterface
        params:
          - java_type: android.hardware.usb.UsbInterface
            go_name: iface
          - java_type: boolean
            go_name: force
        returns: boolean
        error: true

      - java_method: releaseInterface
        go_name: releaseInterface
        params:
          - java_type: android.hardware.usb.UsbInterface
            go_name: iface
        returns: boolean
        error: true

      - java_method: bulkTransfer
        go_name: bulkTransferRaw
        params:
          - java_type: android.hardware.usb.UsbEndpoint
            go_name: endpoint
          - java_type: "byte[]"
            go_name: buffer
          - java_type: int
            go_name: length
          - java_type: int
            go_name: timeout
        returns: int
        error: true

      - java_method: controlTransfer
        go_name: controlTransferRaw
        params:
          - java_type: int
            go_name: requestType
          - java_type: int
            go_name: request
          - java_type: int
            go_name: value
          - java_type: int
            go_name: index
          - java_type: "byte[]"
            go_name: buffer
          - java_type: int
            go_name: length
          - java_type: int
            go_name: timeout
        returns: int
        error: true

      - java_method: getFileDescriptor
        go_name: GetFileDescriptor
        params: []
        returns: int
        error: true

      - java_method: getRawDescriptors
        go_name: GetRawDescriptors
        params: []
        returns: "byte[]"
        error: true

constants:
  # Endpoint direction
  - go_name: DirIn
    value: "0x80"
    go_type: int32
  - go_name: DirOut
    value: "0x00"
    go_type: int32
  # Endpoint transfer type
  - go_name: TransferControl
    value: "0"
    go_type: int32
  - go_name: TransferIsochronous
    value: "1"
    go_type: int32
  - go_name: TransferBulk
    value: "2"
    go_type: int32
  - go_name: TransferInterrupt
    value: "3"
    go_type: int32

callbacks: []
