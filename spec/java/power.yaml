package: power
go_import: "github.com/xaionaro-go/jni/os/power"

classes:
  - java_class: android.os.PowerManager
    go_type: Manager
    obtain: system_service
    service_name: "power"
    close: false

    methods:
      - java_method: isInteractive
        returns: boolean
        go_name: IsInteractive
        error: true

      - java_method: isPowerSaveMode
        returns: boolean
        go_name: IsPowerSaveMode
        error: true

      - java_method: newWakeLock
        params:
          - { java_type: int, go_name: flags }
          - { java_type: String, go_name: tag }
        returns: android.os.PowerManager.WakeLock
        go_name: newWakeLock
        error: true

  - java_class: android.os.PowerManager$WakeLock
    go_type: WakeLock
    kind: manager
    methods:
      - java_method: acquire
        params: [{ java_type: long, go_name: timeoutMs }]
        returns: void
        go_name: acquireMs
        error: true

      - java_method: release
        returns: void
        go_name: Release
        error: true

constants:
  - { go_name: PartialWakeLock, value: 1, go_type: int }

callbacks: []
