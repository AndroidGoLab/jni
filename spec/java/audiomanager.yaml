package: audiomanager
go_import: "github.com/xaionaro-go/jni/media/audiomanager"

classes:
  - java_class: android.media.AudioManager
    go_type: Manager
    obtain: system_service
    service_name: "audio"
    close: true

    methods:
      - java_method: getDevices
        params: [{ java_type: int, go_name: flags }]
        returns: android.media.AudioDeviceInfo[]
        go_name: getDevicesRaw
        error: true

      - java_method: registerAudioDeviceCallback
        params:
          - { java_type: android.media.AudioDeviceCallback, go_name: callback }
          - { java_type: android.os.Handler, go_name: handler }
        returns: void
        go_name: registerAudioDeviceCallback
        error: true

      - java_method: unregisterAudioDeviceCallback
        params: [{ java_type: android.media.AudioDeviceCallback, go_name: callback }]
        returns: void
        go_name: unregisterAudioDeviceCallback
        error: true

      - java_method: requestAudioFocus
        params: [{ java_type: android.media.AudioFocusRequest, go_name: request }]
        returns: int
        go_name: requestAudioFocusRaw
        error: true

      - java_method: abandonAudioFocusRequest
        params: [{ java_type: android.media.AudioFocusRequest, go_name: request }]
        returns: int
        go_name: abandonAudioFocusRequest
        error: true

      - java_method: getStreamVolume
        params: [{ java_type: int, go_name: streamType }]
        returns: int
        go_name: getStreamVolume
        error: true

      - java_method: setStreamVolume
        params:
          - { java_type: int, go_name: streamType }
          - { java_type: int, go_name: index }
          - { java_type: int, go_name: flags }
        returns: void
        go_name: setStreamVolume
        error: true

      - java_method: getStreamMaxVolume
        params: [{ java_type: int, go_name: streamType }]
        returns: int
        go_name: getStreamMaxVolume
        error: true

      - java_method: isSpeakerphoneOn
        params: []
        returns: boolean
        go_name: isSpeakerphoneOn
        error: true

      - java_method: setSpeakerphoneOn
        params: [{ java_type: boolean, go_name: on }]
        returns: void
        go_name: setSpeakerphoneOn
        error: true

  - java_class: android.media.AudioDeviceInfo
    go_type: audioDeviceInfo
    kind: data_class
    fields:
      - { java_method: getId,            returns: int,    go_name: ID,           go_type: int32 }
      - { java_method: getType,          returns: int,    go_name: Type,         go_type: int32 }
      - { java_method: getProductName,   returns: java.lang.CharSequence, go_name: ProductName, go_type: string }
      - { java_method: getAddress,       returns: String, go_name: Address,      go_type: string }
      - { java_method: isSource,         returns: boolean, go_name: IsSource,    go_type: bool }
      - { java_method: isSink,           returns: boolean, go_name: IsSink,      go_type: bool }
      - { java_method: getSampleRates,   returns: "int[]",  go_name: SampleRates,  go_type: "[]int32" }
      - { java_method: getChannelCounts, returns: "int[]",  go_name: ChannelCounts, go_type: "[]int32" }
      - { java_method: getEncodings,     returns: "int[]",  go_name: Encodings,    go_type: "[]int32" }

  - java_class: android.media.AudioFocusRequest$Builder
    go_type: audioFocusRequestBuilder
    obtain: constructor
    constructor_params:
      - { java_type: int, go_name: focusGain }

    methods:
      - java_method: setOnAudioFocusChangeListener
        params: [{ java_type: android.media.AudioManager$OnAudioFocusChangeListener, go_name: listener }]
        returns: android.media.AudioFocusRequest$Builder
        go_name: setOnAudioFocusChangeListener

      - java_method: build
        params: []
        returns: android.media.AudioFocusRequest
        go_name: build

callbacks:
  - java_interface: android.media.AudioDeviceCallback
    go_type: audioDeviceCallback
    kind: abstract_class
    methods:
      - { java_method: onAudioDevicesAdded, params: ["android.media.AudioDeviceInfo[]"], go_field: OnAdded }
      - { java_method: onAudioDevicesRemoved, params: ["android.media.AudioDeviceInfo[]"], go_field: OnRemoved }

  - java_interface: android.media.AudioManager$OnAudioFocusChangeListener
    go_type: audioFocusChangeListener
    methods:
      - { java_method: onAudioFocusChange, params: [int], go_field: OnFocusChange }

constants:
  # DeviceType
  - { go_name: DeviceBuiltinSpeaker, value: "2", go_type: int }
  - { go_name: DeviceBuiltinMic, value: "15", go_type: int }
  - { go_name: DeviceWiredHeadset, value: "3", go_type: int }
  - { go_name: DeviceWiredHeadphones, value: "4", go_type: int }
  - { go_name: DeviceBluetooth, value: "8", go_type: int }
  - { go_name: DeviceBluetoothLE, value: "26", go_type: int }
  - { go_name: DeviceUSB, value: "11", go_type: int }
  - { go_name: DeviceHDMI, value: "9", go_type: int }
  # DeviceFlag
  - { go_name: DevicesInput, value: "1", go_type: int }
  - { go_name: DevicesOutput, value: "2", go_type: int }
  - { go_name: DevicesAll, value: "3", go_type: int }
  # FocusGain
  - { go_name: FocusGain, value: "1", go_type: int }
  - { go_name: FocusGainTransient, value: "2", go_type: int }
  - { go_name: FocusGainTransientDuck, value: "3", go_type: int }
  # FocusLoss
  - { go_name: FocusLoss, value: "-1", go_type: int }
  - { go_name: FocusLossTransient, value: "-2", go_type: int }
  - { go_name: FocusLossTransientDuck, value: "-3", go_type: int }
  # Stream types
  - { go_name: StreamVoiceCall, value: "0", go_type: int }
  - { go_name: StreamSystem, value: "1", go_type: int }
  - { go_name: StreamRing, value: "2", go_type: int }
  - { go_name: StreamMusic, value: "3", go_type: int }
  - { go_name: StreamAlarm, value: "4", go_type: int }
  - { go_name: StreamNotification, value: "5", go_type: int }
