package: wifi_rtt
go_import: github.com/xaionaro-go/jni/net/wifi/rtt
classes:
    - java_class: android.net.wifi.rtt.WifiRttManager
      go_type: wifiRttManager
      obtain: system_service
      service_name: wifirtt
      close: true
      methods:
        - java_method: getRttCharacteristics
          go_name: GetRttCharacteristics
          returns: android.os.Bundle
          error: true
        - java_method: isAvailable
          go_name: IsAvailable
          returns: boolean
          error: true
        - java_method: startRanging
          go_name: StartRanging
          params:
            - java_type: android.net.wifi.rtt.RangingRequest
              go_name: arg0
            - java_type: java.util.concurrent.Executor
              go_name: arg1
            - java_type: android.net.wifi.rtt.RangingResultCallback
              go_name: arg2
          returns: void
          error: true
