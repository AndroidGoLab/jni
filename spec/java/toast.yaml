package: toast
go_import: "github.com/xaionaro-go/jni/widget/toast"

classes:
  - java_class: android.widget.Toast
    go_type: toast  # internal, not exported
    obtain: static_factory

    static_methods:
      - java_method: makeText
        params:
          - { java_type: android.content.Context, go_name: ctx }
          - { java_type: java.lang.CharSequence, go_name: text }
          - { java_type: int, go_name: duration }
        returns: android.widget.Toast
        go_name: makeText
        error: true

    methods:
      - java_method: show
        params: []
        returns: void
        go_name: show
        error: true

constants:
  - go_name: Short
    value: "0"
    go_type: int
  - go_name: Long
    value: "1"
    go_type: int
