package: permission
go_import: "github.com/xaionaro-go/jni/content/permission"

classes:
  - java_class: androidx.core.content.ContextCompat
    go_type: contextCompat  # internal, not exported
    obtain: static_only  # no instance needed

    static_methods:
      - java_method: checkSelfPermission
        params:
          - { java_type: android.content.Context, go_name: ctx }
          - { java_type: String, go_name: permission }
        returns: int
        go_name: checkSelfPermission
        error: true

  - java_class: androidx.core.app.ActivityCompat
    go_type: activityCompat  # internal
    obtain: static_only

    static_methods:
      - java_method: requestPermissions
        params:
          - { java_type: android.app.Activity, go_name: activity }
          - { java_type: "String[]", go_name: permissions }
          - { java_type: int, go_name: requestCode }
        returns: void
        go_name: requestPermissions
        error: true

constants:
  - go_name: AccessFineLocation
    value: '"android.permission.ACCESS_FINE_LOCATION"'
    go_type: string
