package: environment
go_import: "github.com/xaionaro-go/jni/os/environment"

classes:
  - java_class: android.os.Environment
    go_type: environment  # unexported, all methods become package-level functions
    obtain: static_methods  # no instance needed

    static_methods:
      - java_method: getRootDirectory
        returns: java.io.File
        go_name: getRootDirectory

      - java_method: getDataDirectory
        returns: java.io.File
        go_name: getDataDirectory

      - java_method: getExternalStorageDirectory
        returns: java.io.File
        go_name: getExternalStorageDirectory

      - java_method: getExternalStoragePublicDirectory
        params: [{ java_type: String, go_name: typ }]
        returns: java.io.File
        go_name: getExternalStoragePublicDirectory

      - java_method: getExternalStorageState
        returns: String
        go_name: getExternalStorageState

      - java_method: isExternalStorageRemovable
        returns: boolean
        go_name: isExternalStorageRemovable

      - java_method: isExternalStorageEmulated
        returns: boolean
        go_name: isExternalStorageEmulated

      - java_method: isExternalStorageManager
        returns: boolean
        go_name: isExternalStorageManager

  - java_class: java.io.File
    go_type: javaFile  # unexported helper
    methods:
      - java_method: getAbsolutePath
        returns: String
        go_name: getAbsolutePath

constants:
  # Directory types
  - { go_name: Music, value: '"Music"', go_type: string }
  - { go_name: Podcasts, value: '"Podcasts"', go_type: string }
  - { go_name: Ringtones, value: '"Ringtones"', go_type: string }
  - { go_name: Alarms, value: '"Alarms"', go_type: string }
  - { go_name: Notifications, value: '"Notifications"', go_type: string }
  - { go_name: Pictures, value: '"Pictures"', go_type: string }
  - { go_name: Movies, value: '"Movies"', go_type: string }
  - { go_name: Downloads, value: '"Download"', go_type: string }
  - { go_name: DCIM, value: '"DCIM"', go_type: string }
  - { go_name: Documents, value: '"Documents"', go_type: string }
  # Storage state constants
  - { go_name: MediaMounted, value: '"mounted"', go_type: string }
  - { go_name: MediaMountedReadOnly, value: '"mounted_ro"', go_type: string }
  - { go_name: MediaRemoved, value: '"removed"', go_type: string }
  - { go_name: MediaUnmounted, value: '"unmounted"', go_type: string }

callbacks: []
