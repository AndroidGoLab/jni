package: battery
go_import: github.com/AndroidGoLab/jni/os/battery
classes:
    - java_class: android.os.BatteryManager
      go_type: batteryManager
      obtain: system_service
      service_name: batterymanager
      close: true
      methods:
        - java_method: computeChargeTimeRemaining
          go_name: ComputeChargeTimeRemaining
          returns: long
          error: true
        - java_method: getIntProperty
          go_name: GetIntProperty
          params:
            - java_type: int
              go_name: arg0
          returns: int
          error: true
        - java_method: getLongProperty
          go_name: GetLongProperty
          params:
