package: session
go_import: "github.com/xaionaro-go/jni/media/session"

go_types:
  - go_name: SessionInfo
    doc: "Information about an active media session"
    fields:
      - { go_name: PackageName, go_type: string }
      - { go_name: Tag, go_type: string }

overrides:
  android.media.session.MediaSessionManager:
    constructor:
      go_name: NewManager
      params_override: [{ go_name: ctx, go_type: "*app.Context" }]

    composite_methods:
      - go_name: GetActiveSessions
        doc: "Get currently active media sessions"
        params: []
        returns: { go_type: "[]SessionInfo", error: true }
        implementation_notes: |
          1. Call getActiveSessionsRaw(nil) -> List<MediaController>
          2. Iterate list, extract getPackageName/getTag into []SessionInfo

      - go_name: OnActiveSessionsChanged
        doc: "Register for active session change events"
        params: [{ go_name: fn, go_type: "func([]SessionInfo)" }]
        returns: { go_type: "cancel func()", error: true }
        implementation_notes: |
          1. Create OnActiveSessionsChangedListener:
             onActiveSessionsChanged converts List<MediaController> to []SessionInfo, calls fn
          2. Call addOnActiveSessionsChangedListener(listener, nil)
          3. Return cancel func that calls removeOnActiveSessionsChangedListener(listener)

imports:
  - "github.com/xaionaro-go/jni/app"
