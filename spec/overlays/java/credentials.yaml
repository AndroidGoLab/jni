overlays:
  - target: Manager
    constructor:
      go_name: NewManager
      params_override: [{ go_name: ctx, go_type: "*app.Context" }]
      implementation_notes: |
        Call CredentialManager.create(ctx) to obtain the manager instance.

    composite_methods:
      - go_name: GetPassword
        doc: "Requests a stored password credential from the user."
        params:
          - { go_name: activity, go_type: "*app.Activity" }
        returns: { go_type: "*PasswordCredential", error: true }
        implementation_notes: |
          1. Create GetPasswordOption
          2. Build GetCredentialRequest via Builder.addCredentialOption(opt).build()
          3. Call getCredentialRaw(activity, request) — blocking wrapper around suspend function
          4. Extract PasswordCredential from response.getCredential()
          5. Return &PasswordCredential{ID: getId(), Password: getPassword()}

      - go_name: GetPasskey
        doc: "Requests a passkey (WebAuthn) credential using the provided request JSON."
        params:
          - { go_name: activity, go_type: "*app.Activity" }
          - { go_name: requestJSON, go_type: string }
        returns: { go_type: "*PublicKeyCredential", error: true }
        implementation_notes: |
          1. Create GetPublicKeyCredentialOption(requestJSON)
          2. Build GetCredentialRequest via Builder.addCredentialOption(opt).build()
          3. Call getCredentialRaw(activity, request) — blocking wrapper
          4. Cast response.getCredential() to PublicKeyCredential
          5. Return &PublicKeyCredential{AuthResponseJSON: getAuthenticationResponseJson()}

      - go_name: CreatePasskey
        doc: "Creates a new passkey (WebAuthn) credential using the provided request JSON."
        params:
          - { go_name: activity, go_type: "*app.Activity" }
          - { go_name: requestJSON, go_type: string }
        returns: { go_type: "*PublicKeyCredential", error: true }
        implementation_notes: |
          1. Create CreatePublicKeyCredentialRequest(requestJSON)
          2. Call createCredentialRaw(activity, request) — blocking wrapper
          3. Cast response to CreatePublicKeyCredentialResponse
          4. Return &PublicKeyCredential{AuthResponseJSON: getRegistrationResponseJson()}

      - go_name: SavePassword
        doc: "Saves a password credential."
        params:
          - { go_name: activity, go_type: "*app.Activity" }
          - { go_name: cred, go_type: PasswordCredential }
        returns: { go_type: "", error: true }
        implementation_notes: |
          1. Create CreatePasswordRequest(cred.ID, cred.Password)
          2. Call createCredentialRaw(activity, request) — blocking wrapper

      - go_name: ClearCredentialState
        doc: "Clears the credential state for the calling app."
        params: []
        returns: { go_type: "", error: true }
        implementation_notes: |
          1. Create ClearCredentialStateRequest()
          2. Call clearCredentialStateRaw(request) — blocking wrapper

async_wrapping:
  strategy: "runBlocking"
  note: "All CredentialManager methods are Kotlin suspend functions. Wrap with kotlinx.coroutines.runBlocking {} or ListenableFuture.get()."

imports:
  - '"github.com/xaionaro-go/jni/app"'
