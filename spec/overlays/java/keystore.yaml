package: keystore
go_import: "github.com/xaionaro-go/jni/security/keystore"

go_types:
  KeyPurpose:
    underlying: int
    doc: "KeyPurpose indicates the intended use of a cryptographic key"

  KeySpec:
    kind: struct
    doc: "KeySpec describes parameters for key generation"
    fields:
      - { go_name: Alias, go_type: string }
      - { go_name: Algorithm, go_type: string, doc: '"AES", "RSA", "EC", "HMAC"' }
      - { go_name: KeySize, go_type: int }
      - { go_name: Purposes, go_type: KeyPurpose }
      - { go_name: BlockModes, go_type: "[]string", doc: '"CBC", "CTR", "GCM", "ECB"' }
      - { go_name: Paddings, go_type: "[]string", doc: '"PKCS7Padding", "NoPadding", "OAEPPadding"' }
      - { go_name: Digests, go_type: "[]string", doc: '"SHA-256", "SHA-512"' }
      - { go_name: UserAuthRequired, go_type: bool }
      - { go_name: AuthValidityDuration, go_type: "time.Duration", doc: "0 = every use" }
      - { go_name: InvalidateOnEnroll, go_type: bool, doc: "Invalidate key when new biometric enrolled" }
      - { go_name: UnlockedDeviceRequired, go_type: bool }

  KeyStore:
    kind: struct
    doc: "KeyStore provides access to the Android Keystore for key management and crypto operations"

overrides:
  # No system_service constructor — KeyStore uses Open() factory
  java.security.KeyStore:
    suppress_constructor: true

composite_methods:
  # Package-level factory
  - go_name: Open
    receiver: none  # package-level function
    doc: "Open the Android Keystore"
    params: []
    returns: { go_type: "*KeyStore", error: true }
    implementation_notes: |
      Call KeyStore.getInstance("AndroidKeyStore").
      Call load(null) to initialize.
      Return wrapped KeyStore.

  # KeyStore methods
  - go_name: ContainsAlias
    receiver: KeyStore
    doc: "Check if the keystore contains the given alias"
    params: [{ go_name: alias, go_type: string }]
    returns: { go_type: bool, error: true }
    implementation_notes: |
      Call containsAlias(alias).

  - go_name: DeleteEntry
    receiver: KeyStore
    doc: "Delete a key entry by alias"
    params: [{ go_name: alias, go_type: string }]
    returns: { go_type: void, error: true }
    implementation_notes: |
      Call deleteEntry(alias).

  - go_name: Aliases
    receiver: KeyStore
    doc: "List all aliases in the keystore"
    params: []
    returns: { go_type: "[]string", error: true }
    implementation_notes: |
      Call aliasesRaw(). Iterate Enumeration collecting strings into []string.

  - go_name: GenerateSymmetricKey
    receiver: KeyStore
    doc: "Generate a symmetric key (AES/HMAC) with the given spec"
    params: [{ go_name: spec, go_type: KeySpec }]
    returns: { go_type: void, error: true }
    implementation_notes: |
      Build KeyGenParameterSpec from spec:
        new Builder(spec.Alias, int(spec.Purposes))
          .setKeySize(spec.KeySize)  // if > 0
          .setBlockModes(spec.BlockModes...)
          .setEncryptionPaddings(spec.Paddings...)
          .setDigests(spec.Digests...)
          .setUserAuthenticationRequired(spec.UserAuthRequired)
          .setUserAuthenticationValidityDurationSeconds(int(spec.AuthValidityDuration.Seconds()))
          .setInvalidatedByBiometricEnrollment(spec.InvalidateOnEnroll)
          .setUnlockedDeviceRequired(spec.UnlockedDeviceRequired)  // API 28+
          .build()
      Get KeyGenerator.getInstance(spec.Algorithm, "AndroidKeyStore").
      Call init(keyGenParamSpec), then generateKey().

  - go_name: GenerateKeyPair
    receiver: KeyStore
    doc: "Generate an asymmetric key pair (RSA/EC) with the given spec"
    params: [{ go_name: spec, go_type: KeySpec }]
    returns: { go_type: void, error: true }
    implementation_notes: |
      Build KeyGenParameterSpec from spec (same as GenerateSymmetricKey).
      For asymmetric: use setSignaturePaddings for sign/verify purposes.
      Get KeyPairGenerator.getInstance(spec.Algorithm, "AndroidKeyStore").
      Call initialize(keyGenParamSpec), then generateKeyPair().

  - go_name: Encrypt
    receiver: KeyStore
    doc: "Encrypt plaintext using the key at alias. Returns ciphertext and IV."
    params:
      - { go_name: alias, go_type: string }
      - { go_name: plaintext, go_type: "[]byte" }
    returns: { go_type: "ciphertext []byte, iv []byte, err error" }
    implementation_notes: |
      Get key entry from keystore via getEntry(alias, null).
      Cast to SecretKeyEntry or determine key type.
      For AES-GCM: Cipher.getInstance("AES/GCM/NoPadding").
      Call initWithKey(Cipher.ENCRYPT_MODE, key).
      Call doFinal(plaintext) → ciphertext.
      Call getIV() → iv.
      Return ciphertext, iv, nil.

  - go_name: Decrypt
    receiver: KeyStore
    doc: "Decrypt ciphertext using the key at alias with the given IV"
    params:
      - { go_name: alias, go_type: string }
      - { go_name: ciphertext, go_type: "[]byte" }
      - { go_name: iv, go_type: "[]byte" }
    returns: { go_type: "[]byte", error: true }
    implementation_notes: |
      Get key entry from keystore.
      For AES-GCM: Cipher.getInstance("AES/GCM/NoPadding").
      Create GCMParameterSpec(128, iv).
      Call initWithKeyAndParams(Cipher.DECRYPT_MODE, key, gcmSpec).
      Call doFinal(ciphertext) → plaintext.

  - go_name: Sign
    receiver: KeyStore
    doc: "Sign data using the private key at alias"
    params:
      - { go_name: alias, go_type: string }
      - { go_name: data, go_type: "[]byte" }
    returns: { go_type: "[]byte", error: true }
    implementation_notes: |
      Get key entry, extract PrivateKey.
      Determine algorithm from key type (e.g. "SHA256withECDSA" for EC, "SHA256withRSA" for RSA).
      Signature.getInstance(algorithm).
      Call initSign(privateKey), update(data), sign() → signature bytes.

  - go_name: Verify
    receiver: KeyStore
    doc: "Verify a signature using the public key at alias"
    params:
      - { go_name: alias, go_type: string }
      - { go_name: data, go_type: "[]byte" }
      - { go_name: signature, go_type: "[]byte" }
    returns: { go_type: bool, error: true }
    implementation_notes: |
      Get key entry, extract certificate → PublicKey.
      Signature.getInstance(algorithm).
      Call initVerify(publicKey), update(data), verify(signature) → bool.

transforms:
  duration_to_seconds:
    doc: "Convert time.Duration to seconds (int)"
    expression: "int(d.Seconds())"

imports:
  - "time"
