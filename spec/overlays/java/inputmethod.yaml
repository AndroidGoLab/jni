package: inputmethod
go_import: "github.com/xaionaro-go/jni/view/inputmethod"

overrides:
  android.view.inputmethod.InputMethodManager:
    constructor:
      go_name: NewManager
      params_override: [{ go_name: ctx, go_type: "*app.Context" }]

    composite_methods:
      - go_name: ShowKeyboard
        doc: "Show the soft keyboard for the given window"
        params: [{ go_name: windowToken, go_type: "unsafe.Pointer" }]
        returns: { error: true }
        implementation_notes: |
          1. Convert windowToken unsafe.Pointer to JNI View/IBinder object
          2. Call showSoftInput(view, 0)

      - go_name: HideKeyboard
        doc: "Hide the soft keyboard for the given window"
        params: [{ go_name: windowToken, go_type: "unsafe.Pointer" }]
        returns: { error: true }
        implementation_notes: |
          1. Convert windowToken unsafe.Pointer to JNI IBinder object
          2. Call hideSoftInputFromWindow(windowToken, 0)

imports:
  - "github.com/xaionaro-go/jni/app"
  - "unsafe"
