package: nsd
go_import: "github.com/AndroidGoLab/jni/net/nsd"

overrides:
  android.net.nsd.NsdManager:
    constructor:
      go_name: NewManager
      params_override: [{ go_name: ctx, go_type: "*app.Context" }]

    composite_methods:
      - go_name: DiscoverServices
        doc: "DiscoverServices starts mDNS/DNS-SD service discovery, returns cancel function"
        params:
          - { go_name: serviceType, go_type: string }
          - { go_name: onFound, go_type: "func(ServiceInfo)" }
          - { go_name: onLost, go_type: "func(ServiceInfo)" }
        returns: { go_type: "cancel func()", error: true }
        implementation_notes: |
          1. Create DiscoveryListener proxy:
             - onServiceFound: extract NsdServiceInfo fields → ServiceInfo, call onFound
             - onServiceLost: extract fields → ServiceInfo, call onLost
             - onDiscoveryStarted/Stopped: no-op
             - onStartDiscoveryFailed: report error
             - onStopDiscoveryFailed: log
          2. Call discoverServicesRaw(serviceType, PROTOCOL_DNS_SD=1, listener)
          3. Return cancel that calls stopServiceDiscoveryRaw(listener)

      - go_name: ResolveService
        doc: "ResolveService resolves a discovered service to get host/port details"
        params: [{ go_name: info, go_type: ServiceInfo }]
        returns: { go_type: "*ServiceInfo", error: true }
        implementation_notes: |
          1. Build NsdServiceInfo from info (setServiceName, setServiceType)
          2. Create ResolveListener proxy:
             - onServiceResolved: extract full NsdServiceInfo → ServiceInfo (including host/port), send to channel
             - onResolveFailed: send error
          3. Call resolveServiceRaw(nsdInfo, listener)
          4. Block on channel, return resolved *ServiceInfo

      - go_name: RegisterService
        doc: "RegisterService registers a network service for discovery by peers"
        params: [{ go_name: info, go_type: ServiceInfo }]
        returns: { go_type: "cancel func()", error: true }
        implementation_notes: |
          1. Build NsdServiceInfo from info (setServiceName, setServiceType, setPort, setAttribute for each attribute)
          2. Create RegistrationListener proxy:
             - onServiceRegistered: signal success
             - onRegistrationFailed: signal error
             - onServiceUnregistered: no-op
             - onUnregistrationFailed: log
          3. Call registerServiceRaw(nsdInfo, PROTOCOL_DNS_SD=1, listener)
          4. Wait for registration success/failure
          5. Return cancel that calls unregisterServiceRaw(listener)

  android.net.nsd.NsdServiceInfo:
    doc: "NSD service information builder/extractor"
    extract_to:
      go_name: ServiceInfo
      implementation_notes: |
        Extract getServiceName → ServiceName, getServiceType → ServiceType,
        getHost.getHostAddress → Host, getPort → Port.
        Attributes extracted via getAttributes() → Map<String,byte[]>.

custom_types:
  - go_name: ServiceInfo
    doc: "Network service discovery information"
    fields:
      - { go_name: ServiceName, go_type: string, doc: "Service instance name" }
      - { go_name: ServiceType, go_type: string, doc: "Service type, e.g. _http._tcp." }
      - { go_name: Host, go_type: string, doc: "Resolved host address" }
      - { go_name: Port, go_type: int, doc: "Resolved port number" }
      - { go_name: Attributes, go_type: "map[string][]byte", doc: "TXT record attributes" }
