package: net
go_import: "github.com/xaionaro-go/jni/net"

overrides:
  android.net.ConnectivityManager:
    constructor:
      go_name: NewManager
      params_override: [{ go_name: ctx, go_type: "*app.Context" }]

    composite_methods:
      # GetActiveNetwork: combine Network + NetworkCapabilities into NetworkInfo
      - go_name: GetActiveNetwork
        doc: "GetActiveNetwork returns information about the current active network"
        params: []
        returns: { go_type: "*NetworkInfo", error: true }
        implementation_notes: |
          1. Call getActiveNetworkRaw() → Network (may be null → return nil, nil)
          2. Call getNetworkCapabilitiesRaw(network) → NetworkCapabilities
          3. Check hasTransport for each Transport constant (WiFi=1, Cellular=0, VPN=4, Bluetooth=2)
          4. Read getLinkDownstreamBandwidthKbps, getLinkUpstreamBandwidthKbps
          5. Populate NetworkInfo struct: Connected=true, Transports=[matched], LinkDown, LinkUp

      # OnConnectivityChanged: register callback with cancel
      - go_name: OnConnectivityChanged
        doc: "OnConnectivityChanged registers for network state changes"
        params:
          - { go_name: fn, go_type: "func(NetworkInfo)" }
        returns: { go_type: "cancel func()", error: true }
        implementation_notes: |
          1. Create NetworkCallback proxy via jni.NewProxy (abstract class)
          2. onCapabilitiesChanged: extract NetworkCapabilities into NetworkInfo, call fn
          3. onLost: call fn with NetworkInfo{Connected: false}
          4. Call registerDefaultNetworkCallbackRaw(callback)
          5. Return cancel that calls unregisterNetworkCallbackRaw(callback) + releases proxy

custom_types:
  - go_name: Transport
    doc: "Network transport type"
    underlying: int

  - go_name: NetworkInfo
    doc: "Information about the active network"
    fields:
      - { go_name: Connected,  go_type: bool,        doc: "Whether a network is available" }
      - { go_name: Transports, go_type: "[]Transport", doc: "Active transport types" }
      - { go_name: LinkDown,   go_type: int32,       doc: "Downstream bandwidth in kbps" }
      - { go_name: LinkUp,     go_type: int32,       doc: "Upstream bandwidth in kbps" }
