package: download
go_import: "github.com/xaionaro-go/jni/app/download"

go_types:
  - go_name: Request
    doc: "Download request configuration"
    fields:
      - { go_name: URL, go_type: string }
      - { go_name: Destination, go_type: string, doc: "File path" }
      - { go_name: Title, go_type: string }
      - { go_name: Description, go_type: string }
      - { go_name: MimeType, go_type: string }

  - go_name: Status
    doc: "Download status"
    base_type: int

overrides:
  android.app.DownloadManager:
    constructor:
      go_name: NewManager
      params_override: [{ go_name: ctx, go_type: "*app.Context" }]

    composite_methods:
      - go_name: Enqueue
        doc: "Start a new download, returns the download ID"
        params: [{ go_name: req, go_type: Request }]
        returns: { go_type: int64, error: true }
        implementation_notes: |
          1. Parse req.URL into android.net.Uri via Uri.parse
          2. Create DownloadManager.Request(uri)
          3. If req.Destination != "": call setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, req.Destination)
          4. If req.Title != "": call setTitle(req.Title)
          5. If req.Description != "": call setDescription(req.Description)
          6. If req.MimeType != "": call setMimeType(req.MimeType)
          7. Call enqueueRaw(request)

      - go_name: Cancel
        doc: "Cancel downloads by ID"
        params: [{ go_name: ids, go_type: "...int64" }]
        returns: { error: true }
        implementation_notes: |
          Call removeRaw(ids)

      - go_name: Query
        doc: "Query the status of a download"
        params: [{ go_name: id, go_type: int64 }]
        returns: { go_type: Status, error: true }
        implementation_notes: |
          1. Create DownloadManager.Query(), call setFilterById(id)
          2. Call queryRaw(query) -> Cursor
          3. Call cursor.moveToFirst()
          4. Get column index for COLUMN_STATUS ("status")
          5. Call cursor.getInt(statusColumn) -> status
          6. Call cursor.close()
          7. Return Status(status)

imports:
  - "github.com/xaionaro-go/jni/app"
