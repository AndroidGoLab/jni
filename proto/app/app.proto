  rpc NormalizeMimeType (NormalizeMimeTypeRequest) returns (NormalizeMimeTypeResponse);
  rpc ParseIntent (ParseIntentRequest) returns (ParseIntentResponse);
  rpc ParseUri (ParseUriRequest) returns (ParseUriResponse);
}
